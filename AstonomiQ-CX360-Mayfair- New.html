<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MAYFAIR CX 360 · Powered by AstonomiQ</title>
<style>
:root{
  --bg:#f4f6f3; --surface:#ffffff; --surface-2:#f9fbf8; --surface-3:#eef3ec;
  --sidebar:#0a3d1f; --sidebar-2:#0f5728; --sidebar-hover:#15703a;
  --border:#dfe4dc; --border-strong:#c9d2c4;
  --ink:#0d2818; --ink-soft:#4a5a4f; --ink-faint:#7d8a80;
  --accent:#147a3d; --accent-2:#0f5d2e; --accent-soft:#e6f3eb; --accent-line:#b8dcc1;
  --accent-light:#8bc34a; --accent-light-soft:#f0f8e6;
  --ok:#178a52; --ok-soft:#e3f5ec;
  --warn:#c2841a; --warn-soft:#fcf2dd;
  --bad:#cf3b3b; --bad-soft:#fbe6e6;
  --info:#2563a8; --info-soft:#e6effa;
  --purple:#6d4aa8; --purple-soft:#efe9f8;
  --teal:#1f6f76; --teal-soft:#e3f1f1;
  --radius:8px; --radius-sm:6px;
  --shadow-sm:0 1px 2px rgba(13,40,24,.06);
  --shadow-md:0 6px 22px rgba(13,40,24,.10);
  --shadow-lg:0 18px 50px rgba(13,40,24,.20);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --serif:"Playfair Display",Georgia,"Times New Roman","Hoefler Text",serif;
  --mono:"SF Mono",ui-monospace,"Cascadia Code","Roboto Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px}
.tnum{font-variant-numeric:tabular-nums}
.mono{font-family:var(--mono)}
.serif{font-family:var(--serif)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#c5cfc4;border-radius:6px;border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:#aebbac}

/* LOGIN */
#login{position:fixed;inset:0;display:flex;z-index:50}
.login-left{flex:1.05;background:linear-gradient(155deg,#0a3d1f 0%,#0f5728 50%,#147a3d 100%);color:#fff;padding:64px 60px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
.login-left:before{content:"";position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(139,195,74,.18),transparent 70%);top:-180px;right:-160px}
.login-left:after{content:"";position:absolute;width:480px;height:480px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.06),transparent 70%);bottom:-160px;left:-140px}
.login-brand{display:flex;align-items:center;gap:14px;position:relative;z-index:2}
.login-brand .lb-mark{width:50px;height:50px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.18);padding:5px}
.login-brand .lb-mark img{width:100%;height:auto;display:block}
.login-brand .wm{font-family:var(--serif);font-size:22px;font-weight:600;letter-spacing:3px;line-height:1;color:#fff}
.login-brand .wm small{display:block;font-family:var(--font);font-size:10px;color:#bfd6c5;font-weight:600;letter-spacing:1.5px;margin-top:5px;text-transform:uppercase}
.login-hero{position:relative;z-index:2;max-width:500px}
.login-hero .eyebrow{text-transform:uppercase;letter-spacing:2.5px;font-size:11px;color:var(--accent-light);font-weight:700;margin-bottom:22px}
.login-hero h1{font-family:var(--serif);font-size:42px;line-height:1.12;font-weight:600;letter-spacing:-.5px;margin-bottom:20px;color:#fff}
.login-hero h1 em{font-style:italic;font-weight:400;color:#d4ea98}
.login-hero p{color:#cde0d2;font-size:15px;line-height:1.65;font-weight:400}
.login-pillars{display:flex;gap:10px;margin-top:32px;flex-wrap:wrap}
.login-pill{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);padding:9px 15px;border-radius:30px;font-size:12.5px;color:#e4eee6;font-weight:550}
.login-foot{position:relative;z-index:2;color:#7fa090;font-size:12px;font-weight:500}
.login-foot b{color:#bfd6c5;font-weight:600}
.login-right{flex:.95;background:var(--surface);display:flex;align-items:center;justify-content:center;padding:40px}
.login-card{width:100%;max-width:400px}
.login-card .lc-brand{margin-bottom:24px;text-align:center}
.login-card .lc-brand img{height:78px;width:auto}
.login-card h2{font-family:var(--serif);font-size:25px;font-weight:600;letter-spacing:-.3px;color:var(--accent-2);text-align:center}
.login-card .lc-sub{color:var(--ink-soft);margin:6px 0 28px;font-size:13.5px;text-align:center}
.field{margin-bottom:16px}
.field label{display:block;font-size:12.5px;font-weight:650;color:var(--ink-soft);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:11px 13px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--surface);color:var(--ink);transition:border .15s,box-shadow .15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;border-radius:var(--radius-sm);font-weight:650;font-size:13.5px;transition:.15s;border:1px solid transparent;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 6px rgba(20,122,61,.25)}
.btn-primary:hover{background:var(--accent-2);box-shadow:0 4px 12px rgba(20,122,61,.32)}
.btn-block{width:100%;padding:12px}
.btn-ghost{background:var(--surface);border:1px solid var(--border-strong);color:var(--ink)}
.btn-ghost:hover{background:var(--surface-2);border-color:var(--ink-faint)}
.btn-sm{padding:6px 11px;font-size:12.5px}
.btn-danger{background:var(--bad);color:#fff}
.btn-danger:hover{filter:brightness(.93)}
.login-err{background:var(--bad-soft);color:var(--bad);padding:10px 13px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:16px;border:1px solid #f3c9c9}
.demo-hint{margin-top:22px;background:var(--surface-2);border:1px solid var(--border);border-left:3px solid var(--accent-light);border-radius:var(--radius);padding:13px 15px;font-size:12.5px;color:var(--ink-soft)}
.demo-hint b{color:var(--ink)}
.demo-hint .dh-row{display:flex;justify-content:space-between;margin-top:6px}
.demo-hint code{font-family:var(--mono);background:#e8ede5;padding:1px 6px;border-radius:4px;color:var(--ink)}

/* APP SHELL */
#app{display:none;height:100vh;overflow:hidden}
.shell{display:grid;grid-template-columns:252px 1fr;height:100vh}
.sidebar{background:var(--sidebar);color:#b6c8bb;display:flex;flex-direction:column;overflow:hidden;position:relative}
.sidebar:before{content:"";position:absolute;top:-100px;right:-80px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(139,195,74,.08),transparent 70%);pointer-events:none}
.sb-brand{padding:20px 18px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.08);position:relative;z-index:1}
.sb-brand .sb-mark{width:44px;height:44px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;padding:5px;flex:none;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.sb-brand .sb-mark img{width:100%;height:auto;display:block}
.sb-brand .wm{font-family:var(--serif);font-size:18px;font-weight:600;color:#fff;letter-spacing:2.5px;line-height:1}
.sb-brand .wm small{display:block;font-family:var(--font);font-size:9.5px;color:#8fac95;font-weight:600;letter-spacing:1.2px;margin-top:4px;text-transform:uppercase}
.sb-tenant{margin:14px 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 12px;position:relative;z-index:1}
.sb-tenant .t-label{font-size:9.5px;text-transform:uppercase;letter-spacing:1px;color:#7d9686;font-weight:700}
.sb-tenant .t-name{font-size:12.5px;color:#eef5f0;font-weight:650;margin-top:2px}
.sb-tenant .t-sub{font-size:10.5px;color:#8fac95;margin-top:2px}
.sb-nav{flex:1;overflow-y:auto;padding:8px 10px 20px;position:relative;z-index:1}
.sb-nav::-webkit-scrollbar-thumb{background:#1f5a35;border-color:var(--sidebar)}
.nav-group{margin-top:14px}
.nav-group .ng-title{font-size:10px;text-transform:uppercase;letter-spacing:1.3px;color:#6a8771;font-weight:700;padding:4px 10px 7px}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:7px;color:#a4bcab;font-size:13.5px;font-weight:550;cursor:pointer;transition:.13s;border-left:3px solid transparent;margin-bottom:1px}
.nav-item:hover{background:var(--sidebar-hover);color:#fff}
.nav-item.active{background:rgba(139,195,74,.15);color:#fff;border-left-color:var(--accent-light)}
.nav-item .ni-icon{width:18px;height:18px;flex:none;opacity:.85}
.nav-item.active .ni-icon{opacity:1;color:var(--accent-light)}
.nav-item .ni-badge{margin-left:auto;background:var(--accent-light);color:#0a3d1f;font-size:10.5px;font-weight:750;padding:1px 7px;border-radius:20px;min-width:20px;text-align:center}
.nav-item .ni-badge.muted{background:#2c5a3b;color:#b6c8bb}
.sb-user{padding:12px 14px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;position:relative;z-index:1}
.sb-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-light));display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:13px;border:2px solid rgba(255,255,255,.15)}
.sb-user .su-name{font-size:13px;color:#eef5f0;font-weight:600;line-height:1.2}
.sb-user .su-role{font-size:11px;color:#8fac95}
.sb-user .su-logout{margin-left:auto;color:#8fac95;font-size:16px;padding:4px}
.sb-user .su-logout:hover{color:#fff}

.main{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.topbar{height:62px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 26px;gap:18px;flex:none;position:relative}
.topbar:after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent-light),transparent);opacity:.7}
.tb-title{font-family:var(--serif);font-size:18px;font-weight:600;letter-spacing:-.2px;color:var(--accent-2)}
.tb-crumb{color:var(--ink-faint);font-size:12.5px}
.tb-search{margin-left:auto;position:relative;width:300px}
.tb-search input{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--border);border-radius:20px;background:var(--surface-2);font-size:13px}
.tb-search input:focus{outline:none;border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px var(--accent-soft)}
.tb-search .ts-ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink-faint)}
.tb-actions{display:flex;align-items:center;gap:10px}
.tb-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);position:relative}
.tb-icon:hover{background:var(--surface-2);color:var(--accent)}
.tb-icon .dot{position:absolute;top:7px;right:8px;width:7px;height:7px;border-radius:50%;background:var(--bad);border:1.5px solid #fff}
.content{flex:1;overflow-y:auto;padding:26px 30px 60px}
.page-head{display:flex;align-items:flex-start;gap:16px;margin-bottom:22px}
.page-head h1{font-family:var(--serif);font-size:26px;font-weight:600;letter-spacing:-.5px;color:var(--ink)}
.page-head .ph-sub{color:var(--ink-soft);font-size:13.5px;margin-top:4px}
.page-head .ph-actions{margin-left:auto;display:flex;gap:9px;align-items:center}

.grid{display:grid;gap:16px}
.g4{grid-template-columns:repeat(4,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm)}
.card-pad{padding:18px 20px}
.card-head{display:flex;align-items:center;padding:15px 20px;border-bottom:1px solid var(--border)}
.card-head h3{font-family:var(--serif);font-size:15.5px;font-weight:600;color:var(--ink);letter-spacing:-.1px}
.card-head .ch-sub{font-size:12px;color:var(--ink-faint);margin-left:8px;font-style:italic}
.card-head .ch-act{margin-left:auto;display:flex;gap:8px;align-items:center}

.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:17px 19px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.stat:before{content:"";position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent-light);opacity:.7}
.stat .s-label{font-size:12px;color:var(--ink-soft);font-weight:600;display:flex;align-items:center;gap:7px}
.stat .s-ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--accent-soft);color:var(--accent);position:absolute;top:16px;right:16px}
.stat .s-val{font-family:var(--serif);font-size:30px;font-weight:600;letter-spacing:-.6px;margin-top:11px;line-height:1;color:var(--ink)}
.stat .s-delta{font-size:12px;margin-top:10px;display:flex;align-items:center;gap:5px;font-weight:600}
.s-delta.up{color:var(--ok)} .s-delta.down{color:var(--bad)} .s-delta.flat{color:var(--ink-faint)}
.stat .s-spark{position:absolute;bottom:0;left:0;right:0;height:30px;opacity:.45}

.tbl-wrap{overflow-x:auto}
table.dt{width:100%;border-collapse:collapse;font-size:13px}
table.dt thead th{text-align:left;padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-faint);font-weight:700;border-bottom:1px solid var(--border);background:var(--surface-2);position:sticky;top:0;white-space:nowrap;cursor:pointer;user-select:none}
table.dt thead th.num{text-align:right}
table.dt tbody td{padding:11px 14px;border-bottom:1px solid #eef2ec;color:var(--ink);vertical-align:middle}
table.dt tbody td.num{text-align:right;font-variant-numeric:tabular-nums}
table.dt tbody tr{transition:background .1s}
table.dt tbody tr:hover{background:var(--surface-2);cursor:pointer}
table.dt tbody tr:last-child td{border-bottom:none}
.t-strong{font-weight:650}
.t-muted{color:var(--ink-faint);font-size:12px}
.cell-2{display:flex;flex-direction:column;gap:1px}
.cell-2 .c2-sub{font-size:11.5px;color:var(--ink-faint)}
.avatar-sm{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex:none}
.row-flex{display:flex;align-items:center;gap:9px}

.chip{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:650;white-space:nowrap}
.chip .cd{width:6px;height:6px;border-radius:50%}
.chip.ok{background:var(--ok-soft);color:var(--ok)} .chip.ok .cd{background:var(--ok)}
.chip.warn{background:var(--warn-soft);color:var(--warn)} .chip.warn .cd{background:var(--warn)}
.chip.bad{background:var(--bad-soft);color:var(--bad)} .chip.bad .cd{background:var(--bad)}
.chip.info{background:var(--info-soft);color:var(--info)} .chip.info .cd{background:var(--info)}
.chip.purple{background:var(--purple-soft);color:var(--purple)} .chip.purple .cd{background:var(--purple)}
.chip.teal{background:var(--teal-soft);color:var(--teal)} .chip.teal .cd{background:var(--teal)}
.chip.neutral{background:#eef2ec;color:var(--ink-soft)} .chip.neutral .cd{background:var(--ink-faint)}
.chip.accent{background:var(--accent-soft);color:var(--accent)} .chip.accent .cd{background:var(--accent)}
.chip.lime{background:var(--accent-light-soft);color:#4d7a1e} .chip.lime .cd{background:var(--accent-light)}
.tag{display:inline-block;padding:2px 9px;border-radius:5px;font-size:11px;font-weight:600;background:#eef2ec;color:var(--ink-soft);margin-right:4px}
.tier-badge{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:.3px}
.tier-Platinum{background:#0a3d1f;color:#d4ea98}
.tier-Gold{background:var(--accent-soft);color:var(--accent-2);border:1px solid var(--accent-line)}
.tier-Silver{background:#eef2ec;color:#5a6b5e}
.tier-Member{background:var(--accent-light-soft);color:#4d7a1e}

.filterbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.filterbar select,.filterbar input{padding:8px 11px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--surface);font-size:13px;color:var(--ink)}
.filterbar select:focus,.filterbar input:focus{outline:none;border-color:var(--accent)}
.filterbar .fb-spacer{margin-left:auto}
.seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:3px}
.seg button{padding:6px 13px;border-radius:6px;font-size:12.5px;font-weight:600;color:var(--ink-soft)}
.seg button.active{background:var(--accent);color:#fff;box-shadow:var(--shadow-sm)}

.backdrop{position:fixed;inset:0;background:rgba(10,40,24,.50);z-index:60;opacity:0;transition:opacity .2s;backdrop-filter:blur(1px)}
.backdrop.show{opacity:1}
.drawer{position:fixed;top:0;right:0;bottom:0;width:560px;max-width:94vw;background:var(--surface);z-index:61;box-shadow:var(--shadow-lg);transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.drawer.show{transform:translateX(0)}
.drawer.wide{width:860px}
.dr-head{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px;flex:none;background:linear-gradient(180deg,var(--accent-soft),transparent)}
.dr-head h2{font-family:var(--serif);font-size:19px;font-weight:600;letter-spacing:-.3px;color:var(--accent-2)}
.dr-head .dh-sub{font-size:12.5px;color:var(--ink-soft);margin-top:2px}
.dr-close{margin-left:auto;width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);font-size:20px}
.dr-close:hover{background:var(--surface-2)}
.dr-body{flex:1;overflow-y:auto;padding:22px 24px}
.dr-foot{padding:15px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;flex:none;background:var(--surface-2)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 16px}
.form-grid .full{grid-column:1/-1}

.stepper{display:flex;align-items:center;gap:0;margin:4px 0}
.step{display:flex;align-items:center;flex:1}
.step .sc{display:flex;flex-direction:column;align-items:center;gap:6px;flex:none}
.step .dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:#eef2ec;color:var(--ink-faint);border:2px solid #eef2ec}
.step.done .dot{background:var(--accent);color:#fff;border-color:var(--accent)}
.step.current .dot{background:var(--accent-light);color:#0a3d1f;border-color:var(--accent-light);box-shadow:0 0 0 5px var(--accent-light-soft)}
.step .slabel{font-size:10.5px;font-weight:600;color:var(--ink-faint);white-space:nowrap}
.step.done .slabel,.step.current .slabel{color:var(--ink)}
.step .bar{height:2px;flex:1;background:#eef2ec;margin:0 4px;margin-bottom:18px}
.step.done .bar{background:var(--accent)}

.kanban{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px}
.kcol{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;min-width:268px;width:268px;flex:none;display:flex;flex-direction:column;max-height:calc(100vh - 230px)}
.kcol-head{padding:12px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.kcol-head .kc-title{font-size:12.5px;font-weight:700;color:var(--accent-2)}
.kcol-head .kc-count{margin-left:auto;background:var(--accent-soft);color:var(--accent);font-size:11px;font-weight:700;padding:1px 8px;border-radius:12px}
.kcol-head .kc-val{font-size:11px;color:var(--ink-faint);font-weight:600}
.kcol-body{padding:10px;overflow-y:auto;display:flex;flex-direction:column;gap:9px;flex:1}
.kcard{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;box-shadow:var(--shadow-sm);cursor:pointer;transition:.13s}
.kcard:hover{box-shadow:var(--shadow-md);border-color:var(--accent-line);transform:translateY(-1px)}
.kcard .kc-top{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.kcard .kc-name{font-size:13px;font-weight:680;color:var(--ink)}
.kcard .kc-meta{font-size:11.5px;color:var(--ink-soft);margin-bottom:8px}
.kcard .kc-foot{display:flex;align-items:center;gap:7px;margin-top:8px}
.kcard .kc-amt{font-size:13.5px;font-weight:720;color:var(--accent-2);font-family:var(--serif)}
.score-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.score-hot{background:var(--bad-soft);color:var(--bad)}
.score-warm{background:var(--warn-soft);color:var(--warn)}
.score-cool{background:var(--info-soft);color:var(--info)}

.convo-grid{display:grid;grid-template-columns:1fr 320px;gap:16px;height:calc(100vh - 200px)}
.convo-main{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;overflow:hidden}
.convo-head{padding:15px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex:none;background:var(--surface-2)}
.convo-msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;background:var(--surface-3)}
.msg{max-width:74%;display:flex;flex-direction:column;gap:4px}
.msg .mb{padding:11px 14px;border-radius:12px;font-size:13.5px;line-height:1.5}
.msg .mt{font-size:11px;color:var(--ink-faint)}
.msg.customer{align-self:flex-start}
.msg.customer .mb{background:#fff;border:1px solid var(--border);border-bottom-left-radius:3px}
.msg.agent{align-self:flex-end;align-items:flex-end}
.msg.agent .mb{background:var(--accent);color:#fff;border-bottom-right-radius:3px}
.convo-reply{padding:14px 18px;border-top:1px solid var(--border);flex:none}
.convo-reply textarea{width:100%;border:1px solid var(--border-strong);border-radius:8px;padding:11px;resize:none;min-height:64px}
.convo-reply textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.convo-side{display:flex;flex-direction:column;gap:14px;overflow-y:auto}
.ai-panel{background:linear-gradient(160deg,#f3faf0,#fff);border:1px solid var(--accent-line);border-radius:var(--radius);padding:15px 17px;position:relative;overflow:hidden}
.ai-panel:before{content:"";position:absolute;top:-30px;right:-30px;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle,rgba(139,195,74,.18),transparent 70%)}
.ai-panel .ap-head{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:720;color:var(--accent);margin-bottom:11px;position:relative;z-index:1}
.ai-suggest{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 13px;font-size:12.5px;color:var(--ink-soft);line-height:1.5;margin-bottom:10px;position:relative;z-index:1}
.spark-line{height:3px;background:linear-gradient(90deg,var(--accent),var(--accent-light));border-radius:3px;margin-bottom:11px}

.p360-head{display:flex;gap:18px;align-items:center;background:linear-gradient(135deg,var(--surface),var(--accent-soft));border:1px solid var(--accent-line);border-radius:var(--radius);padding:22px 24px;box-shadow:var(--shadow-sm)}
.p360-av{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:750;color:#fff;flex:none;font-family:var(--serif);border:3px solid #fff;box-shadow:0 4px 12px rgba(20,122,61,.25)}
.timeline{position:relative;padding-left:26px}
.timeline:before{content:"";position:absolute;left:8px;top:4px;bottom:4px;width:2px;background:var(--border)}
.tl-item{position:relative;padding-bottom:18px}
.tl-item:before{content:"";position:absolute;left:-22px;top:3px;width:12px;height:12px;border-radius:50%;background:#fff;border:2px solid var(--accent)}
.tl-item .tl-date{font-size:11.5px;color:var(--ink-faint);font-weight:600}
.tl-item .tl-title{font-size:13.5px;font-weight:650;margin:2px 0;color:var(--ink)}
.tl-item .tl-desc{font-size:12.5px;color:var(--ink-soft)}

.bars{display:flex;flex-direction:column;gap:11px}
.bar-row{display:grid;grid-template-columns:140px 1fr 60px;align-items:center;gap:12px;font-size:12.5px}
.bar-track{height:9px;background:#eef2ec;border-radius:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;background:var(--accent)}
.bar-row .bv{text-align:right;font-weight:650;font-variant-numeric:tabular-nums}
.attn-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid #eef2ec;cursor:pointer}
.attn-row:hover{background:var(--surface-2)}
.attn-row:last-child{border-bottom:none}
.attn-ic{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex:none}
.kv{display:grid;grid-template-columns:140px 1fr;gap:9px 14px;font-size:13px}
.kv .k{color:var(--ink-soft);font-weight:600}
.kv .v{font-weight:550}
.divider{height:1px;background:var(--border);margin:18px 0}
.empty{text-align:center;padding:50px 20px;color:var(--ink-faint)}
.empty .e-ic{font-size:34px;opacity:.4;margin-bottom:10px}
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:80;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:var(--ink);color:#fff;padding:11px 20px;border-radius:9px;font-size:13px;font-weight:550;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:9px;animation:tin .25s ease}
.toast.ok{background:var(--accent)}
@keyframes tin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.diff-box{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:13px;font-family:var(--mono);font-size:11.5px;white-space:pre-wrap;line-height:1.6;max-height:260px;overflow:auto}
.diff-add{background:#dcfce0;color:#15623f}
.diff-del{background:#fbe2e2;color:#9c2a2a;text-decoration:line-through}
.mini-don{display:flex;align-items:center;gap:16px}
.legend{display:flex;flex-direction:column;gap:7px}
.legend .lg{display:flex;align-items:center;gap:8px;font-size:12.5px}
.legend .lg .ld{width:10px;height:10px;border-radius:3px}
.legend .lg .lv{margin-left:auto;font-weight:650;font-variant-numeric:tabular-nums;padding-left:20px}
.insight{background:linear-gradient(135deg,var(--accent-soft),var(--accent-light-soft));border:1px solid var(--accent-line);border-radius:8px;padding:12px 14px;font-size:12.5px;color:var(--ink);display:flex;gap:10px;align-items:flex-start}
.insight .in-ic{color:var(--accent);flex:none;margin-top:1px}
@media(max-width:1180px){.g4{grid-template-columns:repeat(2,1fr)}.convo-grid{grid-template-columns:1fr}.tb-search{width:200px}}
</style>
</head>

/* ---------- STORAGE (localStorage w/ memory fallback) ---------- */
const Store = (function(){
  let mem = {};
  let ok = false;
  try { const k="__t"; window.localStorage.setItem(k,"1"); window.localStorage.removeItem(k); ok=true; } catch(e){ ok=false; }
  return {
    get(key){ try { return ok ? window.localStorage.getItem(key) : (mem[key]??null); } catch(e){ return mem[key]??null; } },
    set(key,val){ try { ok ? window.localStorage.setItem(key,val) : (mem[key]=val); } catch(e){ mem[key]=val; } },
    del(key){ try { ok ? window.localStorage.removeItem(key) : (delete mem[key]); } catch(e){ delete mem[key]; } }
  };
})();

/* ---------- HELPERS ---------- */
function cid(){ return "id_"+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4); }
function nowISO(){ return new Date().toISOString(); }
function daysAgo(n){ const d=new Date(); d.setDate(d.getDate()-n); return d.toISOString(); }
function daysAhead(n){ const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString(); }
function hoursAhead(h){ const d=new Date(); d.setHours(d.getHours()+h); return d.toISOString(); }
function fmtDate(iso){ if(!iso) return "—"; const d=new Date(iso); return d.toLocaleDateString("en-IN",{year:"numeric",month:"short",day:"numeric"}); }
function fmtDateTime(iso){ if(!iso) return "—"; const d=new Date(iso); return d.toLocaleString("en-IN",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}); }
function fmtMoney(n){ const v=Number(n)||0;
  if(Math.abs(v)>=10000000) return "₹"+(v/10000000).toFixed(2)+" Cr";
  if(Math.abs(v)>=100000) return "₹"+(v/100000).toFixed(2)+" L";
  return new Intl.NumberFormat("en-IN",{style:"currency",currency:CUR,maximumFractionDigits:0}).format(v);
}
function fmtNum(n){ return new Intl.NumberFormat("en-IN").format(Number(n)||0); }
function initials(name){ return (name||"?").split(" ").filter(Boolean).slice(0,2).map(s=>s[0]).join("").toUpperCase(); }
function timeFrom(iso){ if(!iso) return "—"; const diff=Date.now()-new Date(iso).getTime(); const m=Math.round(diff/60000);
  if(m<1) return "just now"; if(m<60) return m+"m ago"; const h=Math.round(m/60); if(h<24) return h+"h ago"; return Math.round(h/24)+"d ago"; }
function timeUntil(iso){ if(!iso) return {txt:"—",risk:false,over:false}; const diff=new Date(iso).getTime()-Date.now(); const m=Math.round(diff/60000);
  if(m<0){ const am=Math.abs(m); return {txt:(am<60?am+"m":Math.round(am/60)+"h")+" overdue",risk:true,over:true}; }
  if(m<60) return {txt:"in "+m+"m",risk:true,over:false}; const h=Math.round(m/60);
  if(h<24) return {txt:"in "+h+"h",risk:h<4,over:false}; return {txt:"in "+Math.round(h/24)+"d",risk:false,over:false}; }
function safeClone(o){ try{ return JSON.parse(JSON.stringify(o)); }catch(e){ return null; } }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[m])); }
function avColor(seed){ const c=["#147a3d","#1f6f76","#6d4aa8","#2563a8","#c2841a","#0f5d2e","#cf3b3b","#4d7a1e"]; let h=0; for(const ch of (seed||"")) h=(h*31+ch.charCodeAt(0))>>>0; return c[h%c.length]; }
function sum(arr,f){ return (arr||[]).reduce((s,x)=>s+(Number(f?f(x):x)||0),0); }
function avg(arr,f){ const a=arr||[]; return a.length?sum(a,f)/a.length:0; }
function groupBy(arr,f){ const o={}; (arr||[]).forEach(x=>{ const k=f(x); (o[k]=o[k]||[]).push(x); }); return o; }
function pick(arr,i){ return arr[i%arr.length]; }

/* ---------- DATA ENGINE ---------- */
const DB = { data:{}, audit:[] };
function dbKey(){ return NS+":data"; }
function auditKey(){ return NS+":audit"; }

function loadDB(){
  let loaded=false;
  const raw=Store.get(dbKey());
  if(raw){ try{ DB.data=JSON.parse(raw); loaded=true; }catch(e){} }
  if(!loaded){ DB.data=SEED(); persistDB(); }
  else { ensureSchema(); }
  const a=Store.get(auditKey());
  if(a){ try{ DB.audit=JSON.parse(a); }catch(e){ DB.audit=[]; } }
  else { DB.audit=[]; }
}
function ensureSchema(){
  const required=["customers","tickets","kb","csat","leads","accounts","members","points","offers","redemptions","agents","bookings","reviews","events","spabookings","propstats",
    "sancMilestones","sancQuotes","sancPricing","sancArrivals","sancVoiceCalls","sancBeoRisks","sancReviewAi","sancLeadAi","sancForecasts","sancChurnAi",
    "finProps","finDebtors","finCreditors","finRemittance","finCash","finIngestion"];
  const missing=required.filter(k=>!DB.data[k]||!DB.data[k].length);
  if(!missing.length) return;
  const fresh=SEED();
  missing.forEach(k=>{ DB.data[k]=fresh[k]; });
  persistDB();
}
function persistDB(){ Store.set(dbKey(),JSON.stringify(DB.data)); }
function persistAudit(){ Store.set(auditKey(),JSON.stringify(DB.audit)); }
function coll(name){ return DB.data[name]||[]; }
function byId(name,id){ return coll(name).find(r=>r.id===id); }

function logAudit(action,entity,entityId,before,after){
  const entry={ id:cid(), ts:nowISO(), actor:(App.user?App.user.email:"system"),
    action, entity, entityId, summary:auditSummary(action,entity,before,after),
    before:before?safeClone(before):null, after:after?safeClone(after):null };
  DB.audit.unshift(entry); persistAudit();
}
function auditSummary(action,entity,before,after){
  if(action==="login") return "Signed in to CX 360";
  if(action==="logout") return "Signed out";
  if(action==="export") return "Exported "+(after&&after.format?after.format.toUpperCase()+" · ":"")+entity+(after&&after.count!=null?" ("+after.count+" rows)":"");
  if(action==="create") return "Created "+entity+(after&&(after.ref||after.name||after.subject)?" "+(after.ref||after.name||after.subject):"");
  if(action==="delete") return "Deleted "+entity+(before&&(before.ref||before.name)?" "+(before.ref||before.name):"");
  if(action==="status"&&before&&after) return entity+" status "+before.status+" → "+after.status;
  if(action==="update"&&before&&after){ const ch=Object.keys(after).filter(k=>!["updatedAt"].includes(k)&&JSON.stringify(before[k])!==JSON.stringify(after[k])); return "Updated "+entity+" ("+(ch.slice(0,4).join(", ")||"no change")+")"; }
  if(action==="ai") return after&&after.note?after.note:"AI action on "+entity;
  return action+" "+entity;
}

function addRec(entity,rec){ const r={ id:cid(), createdAt:nowISO(), ...rec }; DB.data[entity]=[r,...coll(entity)]; persistDB(); logAudit("create",entity,r.id,null,r); return r; }
function updateRec(entity,id,patch){ const before=byId(entity,id); const after={...before,...patch,updatedAt:nowISO()};
  DB.data[entity]=coll(entity).map(r=>r.id===id?after:r); persistDB(); logAudit("update",entity,id,before,after); return after; }
function removeRec(entity,id){ const before=byId(entity,id); DB.data[entity]=coll(entity).filter(r=>r.id!==id); persistDB(); logAudit("delete",entity,id,before,null); }

/* ---------- WORKFLOW ENGINE ---------- */
const WORKFLOWS = {
  ticket:{ stages:["New","Open","Pending","Resolved","Closed"],
    transitions:{ "New":["Open","Escalated"], "Open":["Pending","Resolved","Escalated"], "Pending":["Open","Resolved"], "Escalated":["Open","Resolved"], "Resolved":["Closed","Open"], "Closed":[] } },
  lead:{ stages:["New","Qualified","Proposal","Negotiation","Won"],
    transitions:{ "New":["Qualified","Lost"], "Qualified":["Proposal","Lost"], "Proposal":["Negotiation","Lost"], "Negotiation":["Won","Lost"], "Won":[], "Lost":[] } }
};
function nextStages(entity,from){ const w=WORKFLOWS[entity]; return w?(w.transitions[from]||[]):[]; }
function moveStage(entity,id,to,sideEffects){
  const rec=byId(entity,id); if(!rec) return;
  const before=safeClone(rec);
  const after=updateRecRaw(entity,id,{status:to});
  logAudit("status",entity,id,before,after);
  if(sideEffects) sideEffects(after,before);
  return after;
}
function updateRecRaw(entity,id,patch){ const before=byId(entity,id); const after={...before,...patch,updatedAt:nowISO()}; DB.data[entity]=coll(entity).map(r=>r.id===id?after:r); persistDB(); return after; }

function resetDemo(){ Store.del(dbKey()); Store.del(auditKey()); location.reload(); }

   ============================================================ */
function scoreLead(l){
  let s=30; const reasons=[];
  const v=l.value||0;
  if(v>=5000000){ s+=30; reasons.push("Very high value (₹50L+)"); }
  else if(v>=2000000){ s+=22; reasons.push("High value (₹20L+)"); }
  else if(v>=800000){ s+=12; reasons.push("Mid value"); }
  else { s+=4; reasons.push("Lower value"); }
  if(["Wedding","MICE / Conference","Corporate / MICE"].includes(l.type)){ s+=14; reasons.push(l.type+" — strong fit"); }
  if(["Referral","Walk-in"].includes(l.source)){ s+=10; reasons.push("Warm source ("+l.source+")"); }
  else if(["Website","Portal","Email"].includes(l.source)){ s+=6; reasons.push("Inbound enquiry"); }
  const stageBoost={New:0,Qualified:8,Proposal:14,Negotiation:20,Won:30,Lost:-25}[l.status]||0;
  s+=stageBoost; if(stageBoost>0) reasons.push("Stage: "+l.status);
  if((l.ageDays||0)>14 && !["Won","Negotiation"].includes(l.status)){ s-=12; reasons.push("Going cold ("+l.ageDays+"d no progress)"); }
  if((l.tags||[]).includes("high-value")||(l.tags||[]).includes("buyout")){ s+=6; reasons.push("Flagged high-value"); }
  s=Math.max(2,Math.min(99,s));
  const band=s>=70?"Hot":s>=45?"Warm":"Cool";
  return {score:s,band,reasons};
}
function predictChurn(m){
  const daysSince=Math.round((Date.now()-new Date(m.lastStayAt).getTime())/86400000);
  let score=0; let reason=[];
  if(daysSince>180){ score+=45; reason.push(daysSince+" days since last stay"); }
  else if(daysSince>90){ score+=28; reason.push("No stay in "+daysSince+" days"); }
  else if(daysSince>45){ score+=12; reason.push("Cooling — "+daysSince+"d since stay"); }
  else { reason.push("Recently active"); }
  if(m.tier==="Platinum"&&daysSince>60){ score+=12; reason.push("High-value at risk"); }
  if(m.stays<=3){ score+=8; reason.push("Low stay history"); }
  score=Math.max(3,Math.min(96,score));
  const risk=score>=55?"High":score>=30?"Medium":"Low";
  const props=["Mayfair On Sea, Morjim, Goa","Mayfair Spa Resort & Casino, Gangtok","Mayfair Himalayan Spa Resort, Kalimpong","Mayfair Palm Beach Resort, Gopalpur"];
  const nextBest=m.homeProperty&&m.homeProperty.includes("Goa")?"Mayfair Spa Resort & Casino, Gangtok":props[(m.stays||0)%props.length];
  return {score,risk,reason:reason.join(" · "),nextBest};
}
function analyzeSentiment(text){
  const t=(text||"").toLowerCase();
  const neg=["not","disappoint","frustrat","urgent","never","spoil","dispute","error","wrong","delay","uncomfortable","poor","bad","issue","problem","again"];
  const pos=["thank","great","wonderful","perfect","love","excellent","happy","magical","thoughtful","appreciate","congratulations","delight"];
  let n=0,p=0; neg.forEach(w=>{ if(t.includes(w)) n++; }); pos.forEach(w=>{ if(t.includes(w)) p++; });
  if(n>p) return "Negative"; if(p>n) return "Positive"; return "Neutral";
}
function suggestReply(ticket,kb){
  const cust=byId("customers",ticket.customerId)||{name:"there"};
  const last=(ticket.messages||[]).slice().reverse().find(m=>m.from==="customer");
  const text=((ticket.subject||"")+" "+(last?last.body:"")).toLowerCase();
  let best=null,bestScore=0;
  (kb||[]).forEach(a=>{ let sc=0; (a.tags||[]).forEach(tg=>{ if(text.includes(tg.replace("-"," "))||(ticket.tags||[]).includes(tg)) sc+=2; });
    a.title.toLowerCase().split(" ").forEach(w=>{ if(w.length>4&&text.includes(w)) sc++; }); if(sc>bestScore){ bestScore=sc; best=a; } });
  const first=(cust.name||"there").split(" ")[0];
  let body="Dear "+first+",\n\nThank you for reaching out to Mayfair Hotels & Resorts. ";
  if(best){ body+= best.body.split(".")[0]+". "; }
  body+="I'm personally looking into this and will ensure it's resolved promptly. Please let me know if there's anything else I can do to make your experience with us memorable.\n\nWarm regards,\n"+(ticket.assignee&&ticket.assignee!=="—"?ticket.assignee:DEMO_USER.name)+"\nMayfair Guest Experience";
  return {body, article:best};
}
function autoTags(text){
  const t=(text||"").toLowerCase(); const tags=[];
  const map={billing:["bill","folio","invoice","charge","refund","gst"],wedding:["wedding","sangeet","reception"],spa:["spa","massage","therapy"],
    maintenance:["ac","wifi","leak","repair","not working","broken"],booking:["book","reserv","confirm"],corporate:["corporate","offsite","conference","summit","townhall"],
    "churn-risk":["disappoint","never","again","frustrat"],casino:["casino","gaming","table"],dining:["meal","food","dining","jain","vegan"],upsell:["upgrade","honeymoon","anniversary"]};
  Object.entries(map).forEach(([tag,ws])=>{ if(ws.some(w=>t.includes(w))) tags.push(tag); });
  return tags.slice(0,4);
}

}
function priorityChip(p){ const m={High:"bad",Medium:"warn",Low:"neutral"}; return `<span class="chip ${m[p]||'neutral'}"><span class="cd"></span>${esc(p)}</span>`; }
function sentimentChip(s){ const m={Positive:"ok",Neutral:"neutral",Negative:"bad"}; return `<span class="chip ${m[s]||'neutral'}"><span class="cd"></span>${esc(s)}</span>`; }
function scorePill(score,band){ const cls=band==="Hot"?"score-hot":band==="Warm"?"score-warm":"score-cool"; return `<span class="score-pill ${cls}">${icon('spark',11)} ${score} ${band}</span>`; }
function avatar(name,size){ size=size||28; return `<span class="avatar-sm" style="width:${size}px;height:${size}px;background:${avColor(name)}">${initials(name)}</span>`; }

function statCard(label,val,delta,deltaDir,iconName,spark){

/* ---------- SVG CHARTS (offline) ---------- */
function sparkSvg(vals,color){ color=color||"var(--accent)"; const w=120,h=30,max=Math.max(...vals,1),min=Math.min(...vals,0);
  const pts=vals.map((v,i)=>[i/(vals.length-1)*w,h-((v-min)/((max-min)||1))*(h-4)-2]);
  const d="M"+pts.map(p=>p[0].toFixed(1)+","+p[1].toFixed(1)).join(" L");
  return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><path d="${d}" fill="none" stroke="${color}" stroke-width="1.6"/></svg>`; }

function lineChart(series,labels,opts){ opts=opts||{}; const w=opts.w||640,h=opts.h||220,pad=34;
  const all=[].concat(...series.map(s=>s.data)); const max=Math.max(...all,1); const min=0;
  const x=i=>pad+i/(labels.length-1)*(w-pad-12); const y=v=>h-pad-((v-min)/((max-min)||1))*(h-pad-20);
  let grid=""; for(let g=0;g<=4;g++){ const yy=pad+ (g/4)*(h-pad-20); const val=Math.round(max-(g/4)*max);
    grid+=`<line x1="${pad}" y1="${yy}" x2="${w-12}" y2="${yy}" stroke="#eef0f3"/><text x="6" y="${yy+4}" font-size="10" fill="#8b93a4">${val>=1000?(val/1000).toFixed(0)+"k":val}</text>`; }
  let labs=labels.map((l,i)=>`<text x="${x(i)}" y="${h-12}" font-size="10" fill="#8b93a4" text-anchor="middle">${esc(l)}</text>`).join("");
  let paths=series.map(s=>{ const d="M"+s.data.map((v,i)=>x(i).toFixed(1)+","+y(v).toFixed(1)).join(" L");
    const area="M"+x(0)+","+(h-pad)+" L"+s.data.map((v,i)=>x(i).toFixed(1)+","+y(v).toFixed(1)).join(" L")+" L"+x(labels.length-1)+","+(h-pad)+" Z";
    return `<path d="${area}" fill="${s.color}" opacity="0.08"/><path d="${d}" fill="none" stroke="${s.color}" stroke-width="2.2" stroke-linejoin="round"/>`+
      s.data.map((v,i)=>`<circle cx="${x(i)}" cy="${y(v)}" r="2.6" fill="#fff" stroke="${s.color}" stroke-width="1.8"/>`).join(""); }).join("");
  return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}">${grid}${paths}${labs}</svg>`; }

function barChart(data,opts){ opts=opts||{}; const w=opts.w||640,h=opts.h||220,pad=34; const max=Math.max(...data.map(d=>d.value),1);
  const bw=(w-pad-12)/data.length*0.6; const gap=(w-pad-12)/data.length;
  let grid=""; for(let g=0;g<=4;g++){ const yy=pad+(g/4)*(h-pad-20); grid+=`<line x1="${pad}" y1="${yy}" x2="${w-12}" y2="${yy}" stroke="#eef0f3"/>`; }
  let bars=data.map((d,i)=>{ const bh=((d.value)/max)*(h-pad-20); const xx=pad+gap*i+(gap-bw)/2; const yy=h-pad-bh;
    return `<rect x="${xx}" y="${yy}" width="${bw}" height="${bh}" rx="3" fill="${d.color||'var(--accent)'}"/>
      <text x="${xx+bw/2}" y="${yy-5}" font-size="10" fill="#586073" text-anchor="middle" font-weight="600">${d.label2||(d.value>=1000?(d.value/1000).toFixed(0)+"k":d.value)}</text>
      <text x="${xx+bw/2}" y="${h-12}" font-size="10" fill="#8b93a4" text-anchor="middle">${esc(d.label)}</text>`; }).join("");
  return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}">${grid}${bars}</svg>`; }

function donut(data,opts){ opts=opts||{}; const size=opts.size||140,sw=opts.sw||22,r=(size-sw)/2,cx=size/2,cy=size/2,C=2*Math.PI*r;
  const total=sum(data,d=>d.value)||1; let off=0;
  const segs=data.map(d=>{ const frac=d.value/total; const len=frac*C; const seg=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d.color}" stroke-width="${sw}" stroke-dasharray="${len.toFixed(2)} ${(C-len).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})"/>`; off+=len; return seg; }).join("");
  const center=opts.center!=null?`<text x="${cx}" y="${cy-2}" font-size="20" font-weight="750" text-anchor="middle" fill="var(--ink)">${opts.center}</text><text x="${cx}" y="${cy+14}" font-size="10" text-anchor="middle" fill="#8b93a4">${opts.centerSub||""}</text>`:"";
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#eef0f3" stroke-width="${sw}"/>${segs}${center}</svg>`; }

function legend(data){ return `<div class="legend">${data.map(d=>`<div class="lg"><span class="ld" style="background:${d.color}"></span><span>${esc(d.label)}</span><span class="lv tnum">${d.disp!=null?d.disp:d.value}</span></div>`).join("")}</div>`; }
function bars(data){ const max=Math.max(...data.map(d=>d.value),1); return `<div class="bars">${data.map(d=>`<div class="bar-row"><span>${esc(d.label)}</span><div class="bar-track"><div class="bar-fill" style="width:${(d.value/max*100).toFixed(0)}%;background:${d.color||'var(--accent)'}"></div></div><span class="bv tnum">${d.disp!=null?d.disp:d.value}</span></div>`).join("")}</div>`; }
function stepper(stages,current){ const ci=stages.indexOf(current); return `<div class="stepper">${stages.map((s,i)=>{ const cls=i<ci?"done":i===ci?"current":""; return `<div class="step ${cls}">${i>0?'<div class="bar"></div>':''}<div class="sc"><div class="dot">${i<ci?"✓":i+1}</div><div class="slabel">${esc(s)}</div></div></div>`; }).join("")}</div>`; }

function dataTable(cols,rows,onRow){
  if(!rows.length) return `<div class="empty"><div class="e-ic">${icon('inbox',34)}</div>No records match the current filter.</div>`;
  const head=cols.map(c=>`<th class="${c.num?'num':''}">${esc(c.label)}</th>`).join("");
  const body=rows.map(r=>`<tr onclick="${onRow?onRow(r):''}">${cols.map(c=>`<td class="${c.num?'num':''}">${c.cell(r)}</td>`).join("")}</tr>`).join("");
  return `<div class="card"><div class="tbl-wrap"><table class="dt"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div></div>`;
}
function matchSearch(obj,q){ if(!q) return true; q=q.toLowerCase(); return JSON.stringify(obj).toLowerCase().includes(q); }

        <span class="k">Home property</span><span class="v" style="font-size:12px">${esc(c.homeProperty)}</span>
      </div></div></div>
      <div class="ai-panel"><div class="ap-head">${icon('spark',15)} AI Guest Insight</div><div class="spark-line"></div>
        <div style="font-size:12.5px;color:var(--ink-soft);line-height:1.6">${profileInsight(c,m,tickets,leads)}</div>
      </div>
    </div>
  </div>`;
};
function profileInsight(c,m,tickets,leads){
  const open=tickets.filter(t=>!["Resolved","Closed"].includes(t.status));
  const hotLead=leads.find(l=>l.scoreBand==="Hot"&&!["Won","Lost"].includes(l.status));
  let s="";
  if(hotLead) s+="Active <b>"+esc(hotLead.title)+"</b> worth <b>"+fmtMoney(hotLead.value)+"</b> in pipeline — prioritise. ";
  if(open.length) s+=open.length+" open service ticket"+(open.length>1?"s":"")+" — resolve to protect satisfaction. ";
  if(m&&m.churnRisk==="High") s+="High churn risk ("+m.churnScore+"%) — trigger a win-back offer. ";
  if(m&&m.tier==="Platinum") s+="Platinum member — extend white-glove treatment on next stay. ";
  if(!s) s="Healthy, engaged guest. Continue personalised service and loyalty rewards.";
  return s;
}

function stamp(){ return new Date().toISOString().slice(0,10); }
function slug(s){ return String(s).toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,""); }
function exportExcel(d){
  const head="<tr>"+d.cols.map(c=>`<th style="background:#0e1726;color:#fff;padding:6px 10px;text-align:left">${esc(c.label)}</th>`).join("")+"</tr>";
  const body=d.rows.map(r=>"<tr>"+d.cols.map(c=>{ let v=c.value(r); return `<td style="padding:5px 10px;border:1px solid #ccc">${esc(v==null?"":v)}</td>`; }).join("")+"</tr>").join("");
  let totals=""; if(d.cols.some(c=>c.total)){ totals="<tr>"+d.cols.map((c,i)=>{ if(c.total){ const tot=sum(d.rows,r=>Number(c.value(r))||0); return `<td style="padding:5px 10px;border:1px solid #ccc;font-weight:bold;background:#f0f0f0">${tot}</td>`; } return `<td style="padding:5px 10px;border:1px solid #ccc;font-weight:bold;background:#f0f0f0">${i===0?"TOTAL":""}</td>`; }).join("")+"</tr>"; }
  const html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8"></head><body>
    <table><tr><td colspan="${d.cols.length}" style="font-size:16px;font-weight:bold;padding:8px">AstonomiQ — ${esc(d.title)}</td></tr>
    <tr><td colspan="${d.cols.length}" style="padding:4px 8px;color:#555">Mayfair Hotels & Resorts · Generated ${new Date().toLocaleString("en-IN")} · ${d.rows.length} records</td></tr>
    <tr><td colspan="${d.cols.length}"></td></tr>${head}${body}${totals}</table></body></html>`;
  const blob=new Blob([html],{type:"application/vnd.ms-excel"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`AstonomiQ_${slug(d.title)}_${stamp()}.xls`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  logAudit("export",App.reportType,null,null,{format:"xlsx",count:d.rows.length}); toast("Excel downloaded",true);
}
function exportPDF(d){
  const w=window.open("","_blank"); if(!w){ toast("Allow pop-ups to download the PDF report"); return; }
  const accent="#147a3d";
  const head=d.cols.map(c=>`<th class="${c.num?'num':''}">${esc(c.label)}</th>`).join("");
  const body=d.rows.map(r=>`<tr>${d.cols.map(c=>`<td class="${c.num?'num':''}">${esc(c.value(r)==null?"":c.value(r))}</td>`).join("")}</tr>`).join("");
  let tfoot=""; if(d.cols.some(c=>c.total)){ tfoot="<tfoot><tr>"+d.cols.map((c,i)=>{ if(c.total){ return `<td class="num">${fmtNum(sum(d.rows,r=>Number(c.value(r))||0))}</td>`; } return `<td>${i===0?"Total":""}</td>`; }).join("")+"</tr></tfoot>"; }
  w.document.write(`<!doctype html><html><head><meta charset="utf-8"><title>${esc(d.title)}</title><style>
    body{font:13px Georgia,"Times New Roman",serif;color:#0d2818;margin:42px}
    .brand{display:flex;align-items:center;gap:14px;border-bottom:3px solid ${accent};padding-bottom:14px;margin-bottom:6px}
    .mark{width:54px;height:54px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;padding:4px;border:1px solid #dfe4dc}
    .mark img{width:100%;height:auto;display:block}
    h1{font-size:24px;margin:0;letter-spacing:2px;color:${accent};font-weight:600}
    h1 small{display:block;font:600 10px -apple-system,sans-serif;letter-spacing:1.4px;color:#4a5a4f;margin-top:3px;text-transform:uppercase}
    .sub{font-family:Georgia,serif;font-style:italic;color:#4a5a4f;font-size:14px;margin-top:4px}
    .meta{color:#4a5a4f;font-size:12px;margin:14px 0 18px;font-family:-apple-system,sans-serif}
    table{width:100%;border-collapse:collapse;font-size:12px;font-family:-apple-system,sans-serif}
    th{text-align:left;background:#e6f3eb;border-bottom:2px solid #b8dcc1;padding:9px 10px;color:#0f5d2e;text-transform:uppercase;font-size:10.5px;letter-spacing:.5px}
    th.num,td.num{text-align:right;font-variant-numeric:tabular-nums}
    td{padding:7px 10px;border-bottom:1px solid #eef2ec}
    tfoot td{font-weight:700;border-top:2px solid #0d2818;background:#f9fbf8}
    .ft{margin-top:26px;color:#7d8a80;font-size:11px;border-top:1px solid #dfe4dc;padding-top:10px;font-family:-apple-system,sans-serif}
    @media print{.noprint{display:none}}
  </style></head><body>
    <div class="brand"><div class="mark"><img src="${MAYFAIR_MEDALLION}"/></div><div><h1>MAYFAIR<small>Hotels &amp; Resorts · CX 360</small></h1><div class="sub">${esc(d.title)}</div></div></div>
    <div class="meta">Generated ${new Date().toLocaleString("en-IN")} · ${d.rows.length} records · Powered by AstonomiQ</div>
    <table><thead><tr>${head}</tr></thead><tbody>${body}</tbody>${tfoot}</table>
    <div class="ft">MAYFAIR CX 360 report · figures reflect the current dataset · confidential</div>
    <button class="noprint" onclick="window.print()" style="margin-top:22px;padding:10px 20px;background:${accent};color:#fff;border:none;border-radius:6px;cursor:pointer;font:600 13px -apple-system,sans-serif">Print / Save as PDF</button>
  </body></html>`);
  w.document.close(); setTimeout(()=>{ try{ w.print(); }catch(e){} },400);
  logAudit("export",App.reportType,null,null,{format:"pdf",count:d.rows.length}); toast("PDF opened — choose Save as PDF",true);
}

App.auditDetail=function(id){ const a=DB.audit.find(x=>x.id===id); if(!a) return;
  const diff=(before,after)=>{ if(!before&&!after) return '<span class="t-muted">No data captured.</span>';
    const keys=[...new Set([...Object.keys(before||{}),...Object.keys(after||{})])].filter(k=>!["messages","scoreReasons"].includes(k));
    return `<div class="diff-box">${keys.map(k=>{ const b=before?before[k]:undefined, af=after?after[k]:undefined;
      if(JSON.stringify(b)===JSON.stringify(af)) return `${esc(k)}: ${esc(fmtVal(af))}`;
      let out=esc(k)+": "; if(b!==undefined) out+=`<span class="diff-del">${esc(fmtVal(b))}</span> `; if(af!==undefined) out+=`<span class="diff-add">${esc(fmtVal(af))}</span>`; return out;
    }).join("\n")}</div>`; };
  App.openDrawer("Audit Event",fmtDateTime(a.ts)+" · "+esc(a.actor),
    `<div class="kv" style="margin-bottom:16px"><span class="k">Action</span><span class="v">${esc(a.action)}</span><span class="k">Entity</span><span class="v">${esc(a.entity)}</span><span class="k">Summary</span><span class="v">${esc(a.summary)}</span></div>
     <div style="font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:8px">BEFORE → AFTER</div>${diff(a.before,a.after)}`,
    `<button class="btn btn-ghost" onclick="App.closeDrawer()">Close</button>`,true); };
function fmtVal(v){ if(v==null) return "—"; if(typeof v==="object") return JSON.stringify(v); return String(v); }

SCREENS.reviews=function(){
  const rows=coll("reviews").filter(r=>matchSearch(r,App.search)).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  const avgScore=avg(rows,r=>r.score);
  const pending=rows.filter(r=>r.status==="Pending");
  const sources=groupBy(rows,r=>r.source);
  const sourceData=Object.entries(sources).map(([s,a],i)=>({label:s,value:a.length,color:["#147a3d","#8bc34a","#1f6f76","#2563a8","#6d4aa8"][i%5]}));
  const propScores=Object.entries(groupBy(rows,r=>r.property)).map(([p,a])=>({label:p.split(",")[0],value:Math.round(avg(a,r=>r.score)*10)/10,color:"#147a3d",disp:(avg(a,r=>r.score)).toFixed(1)+" ★"})).sort((a,b)=>b.value-a.value).slice(0,8);
  const cols=[
    {label:"Source",cell:r=>`<span class="tag" style="font-size:11px">${esc(r.source)}</span>`},
    {label:"Review",cell:r=>`<div class="cell-2"><span class="t-strong">${esc(r.title)}</span><span class="c2-sub">${esc(r.body.slice(0,80))}…</span></div>`},
    {label:"Property",cell:r=>`<span class="t-muted" style="font-size:12px">${esc(r.property.split(",")[0])}</span>`},
    {label:"Score",cell:r=>`<span class="chip ${r.score>=4?'ok':r.score===3?'warn':'bad'}"><span class="cd"></span>${r.score} ★</span>`},
    {label:"Sentiment",cell:r=>sentimentChip(r.sentiment)},
    {label:"Author",cell:r=>`<span class="t-muted">${esc(r.author)}</span>`},
    {label:"Status",cell:r=>r.status==="Responded"?`<span class="chip ok"><span class="cd"></span>Responded</span>`:`<span class="chip warn"><span class="cd"></span>Awaiting reply</span>`},
    {label:"Posted",cell:r=>`<span class="t-muted">${timeFrom(r.createdAt)}</span>`}

App.openReview=function(id){ const r=byId("reviews",id); if(!r) return;

  const draft=composeReviewReply(r);
  App.openDrawer(esc(r.title),esc(r.source)+" · "+esc(r.property),
    `<div style="margin-bottom:18px">
      <div class="row-flex" style="gap:10px;margin-bottom:10px">${avatar(r.author,32)}<div><div class="t-strong">${esc(r.author)}</div><div class="t-muted">${esc(r.source)} · ${fmtDate(r.createdAt)}</div></div><div style="margin-left:auto"><span class="chip ${r.score>=4?'ok':r.score===3?'warn':'bad'}"><span class="cd"></span>${r.score} ★</span></div></div>
      <div style="background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:14px;font-size:13px;line-height:1.6;color:var(--ink)">${esc(r.body)}</div>
    </div>

      <div class="ai-suggest" style="white-space:pre-wrap">${esc(draft)}</div>
      <div style="font-size:11.5px;color:var(--ink-soft);margin-top:8px">Voice tuned for Mayfair's heartfelt hospitality. Personalises by guest name, property, and sentiment.</div>
    </div>`,
    `<button class="btn btn-ghost" onclick="App.closeDrawer()">Close</button>${r.status==="Pending"?`<button class="btn btn-primary" onclick="App.postReviewReply('${r.id}')">Post response</button>`:""}`);
};
function composeReviewReply(r){
  const first=r.author.split(" ")[0]; const prop=r.property.split(",")[0];
  if(r.score>=4) return "Dear "+first+",\n\nThank you for taking the time to share your experience at "+prop+". It is heartfelt feedback like yours that reminds us why we do what we do. The team will be delighted to read your kind words.\n\nWe look forward to welcoming you back for many more moments to remember.\n\nWarm regards,\nMayfair Guest Relations";
  if(r.score===3) return "Dear "+first+",\n\nThank you for your honest feedback on your stay at "+prop+". We appreciate you highlighting both what worked and what could be improved. Your observations have been shared with the relevant teams for review.\n\nWe would be grateful for the opportunity to welcome you back and demonstrate the standards Mayfair is known for.\n\nWarm regards,\nMayfair Guest Relations";
  return "Dear "+first+",\n\nWe are truly sorry to hear that your experience at "+prop+" fell short of the Mayfair standard. This is not the hospitality we strive to deliver. Your feedback has been escalated to the property leadership for immediate review.\n\nMay I request a moment of your time to make this right? Please reach out at guestrelations@mayfairhotels.com and we will personally ensure your concerns are addressed.\n\nWith sincere apologies,\nMayfair Guest Relations";
}
App.postReviewReply=function(id){ updateRec("reviews",id,{status:"Responded",respondedBy:App.user.name}); App.closeDrawer(); toast("Response posted to review channel",true); App.render(); };

SCREENS.channels=function(){
  const bookings=coll("bookings");
  const byChannel=groupBy(bookings,b=>b.channel);
  const totalRev=sum(bookings,b=>b.value);
  const totalComm=sum(bookings,b=>b.otaCommission)+sum(bookings.filter(b=>b.channelType==="B2B"),b=>b.commission);
  const directRev=sum(bookings.filter(b=>b.channelType==="Direct"),b=>b.value);
  const otaRev=sum(bookings.filter(b=>b.channelType==="OTA"),b=>b.value);
  const b2bRev=sum(bookings.filter(b=>b.channelType==="B2B"),b=>b.value);
  const eventsRev=sum(bookings.filter(b=>b.channelType==="Events"),b=>b.value);
  const directShare=Math.round(directRev/totalRev*100);
  const otaShare=Math.round(otaRev/totalRev*100);
  const typeMix=[
    {label:"Direct (Web · Phone · Walk-in)",value:directRev,color:"#147a3d",disp:fmtMoney(directRev)+" ("+directShare+"%)"},
    {label:"OTA (Booking · MMT · Goibibo · Agoda)",value:otaRev,color:"#cf3b3b",disp:fmtMoney(otaRev)+" ("+otaShare+"%)"},
    {label:"B2B Travel Agents",value:b2bRev,color:"#8bc34a",disp:fmtMoney(b2bRev)+" ("+Math.round(b2bRev/totalRev*100)+"%)"},
    {label:"Wedding / Event Planners",value:eventsRev,color:"#6d4aa8",disp:fmtMoney(eventsRev)+" ("+Math.round(eventsRev/totalRev*100)+"%)"}
  ];
  const channelData=Object.entries(byChannel).map(([ch,arr],i)=>({label:ch,value:sum(arr,b=>b.value),color:["#147a3d","#0f5d2e","#178a52","#cf3b3b","#c2841a","#6d4aa8","#1f6f76","#8bc34a","#2563a8"][i%9],disp:fmtMoney(sum(arr,b=>b.value))})).sort((a,b)=>b.value-a.value);
  const commSaved=Math.round(directRev*0.16);
  return pageHead("Channel Mix","Booking-channel breakdown · OTA cost analysis · direct-booking growth strategy")
  + `<div class="grid g4" style="margin-bottom:16px">
      ${statCard("Direct Booking Share",directShare+"%",directShare>40?"healthy mix":"target 40%+",directShare>40?"up":"flat","arrow")}
      ${statCard("OTA Revenue",fmtMoney(otaRev),otaShare+"% of total","flat","chart")}
      ${statCard("OTA Commission Paid",fmtMoney(sum(bookings,b=>b.otaCommission)),"15-18% avg rate","down","alert")}
      ${statCard("Saved via Direct",fmtMoney(commSaved),"vs OTA equivalent","up","star")}
    </div>
    <div class="grid g3" style="margin-bottom:16px">
      <div class="card"><div class="card-head"><h3>Revenue by Channel Type</h3></div><div class="card-pad mini-don"><div>${donut(typeMix.map(t=>({label:t.label,value:t.value,color:t.color})),{center:directShare+"%",centerSub:"direct"})}</div>${legend(typeMix)}</div></div>
      <div class="card" style="grid-column:span 2"><div class="card-head"><h3>Top Channels by Revenue</h3></div><div class="card-pad">${bars(channelData.slice(0,8))}</div></div>
    </div>
    <div class="insight" style="margin-bottom:16px"><span class="in-ic">${icon('spark',15)}</span><span><b>OTA dependency analysis:</b> ${otaShare}% of revenue carries 15-18% commission. Shifting <b>10pts</b> of OTA volume to direct channels would save approximately <b>${fmtMoney(Math.round(otaRev*0.1*0.16))}</b> annually. The B2B Preferred Partner programme at 10% commission is the cheapest assisted channel after direct.</span></div>`
  + `<div class="card-head" style="background:transparent;border:none;padding:0 0 10px"><h3>All Bookings</h3><span class="ch-sub">across all channels</span></div>`
  + dataTable([
    {label:"Ref",cell:b=>b.ref},
    {label:"Guest",cell:b=>`<div class="cell-2"><span class="t-strong">${esc(b.customer)}</span><span class="c2-sub">${esc(b.roomType)}</span></div>`},
    {label:"Property",cell:b=>`<span class="t-muted" style="font-size:12px">${esc(b.property.split(",")[0])}</span>`},
    {label:"Channel",cell:b=>`<span class="chip ${b.channelType==="Direct"?'ok':b.channelType==="OTA"?'bad':b.channelType==="B2B"?'lime':'purple'}"><span class="cd"></span>${esc(b.channel)}</span>`},
    {label:"Value",num:true,cell:b=>`<span class="t-strong tnum">${fmtMoney(b.value)}</span>`},
    {label:"Commission",num:true,cell:b=>b.commission?`<span class="tnum t-muted">${fmtMoney(b.commission)}</span>`:'<span class="t-muted">—</span>'},
    {label:"Status",cell:b=>statusChip(b.status)},
    {label:"Date",cell:b=>fmtDate(b.createdAt)}
  ],bookings.slice().sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)),null);
};

/* ====== 3. AI DYNAMIC PRICING ====== */
function SEED_SANC_PRICING(){
  const days = [];
  const events = {
    7:"Pharma Summit at Convention (city demand)",
    14:"NALCO Anniversary (Sanctuary direct demand)",
    21:"Rath Yatra week (city peak)",
    28:"Investiture · IIM Sambalpur",
    35:"Wedding season starts",
    45:"Diwali week (high leisure)",
    55:"Bhubaneswar Marathon (city demand)"
  };
  for(let i=0;i<60;i++){
    const baseRate = 9800;
    const dayOfWeek = (new Date().getDay() + i) % 7;
    const isWeekend = dayOfWeek===0 || dayOfWeek===5 || dayOfWeek===6;
    let demand = 0.55 + Math.random()*0.25;
    if(isWeekend) demand += 0.12;
    if(events[i]) demand += 0.18;
    if(i>=30 && i<=42) demand += 0.10;
    demand = Math.min(0.95, demand);
    const aiRate = Math.round((baseRate * (0.82 + demand*0.55))/100)*100;
    const compAvg = Math.round(baseRate * (0.78 + Math.random()*0.18));
    const recommend = aiRate > baseRate*1.1 ? "Hold or raise" : aiRate < baseRate*0.92 ? "Lower to compete" : "Match competition";
    days.push({
      id:"sp_"+i,
      date:daysAhead(i),
      dayOfWeek:["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][dayOfWeek],
      forecastOcc:Math.round(demand*100),
      currentRate:baseRate,
      aiRate,
      compAvg,
      delta:aiRate-baseRate,
      event:events[i]||null,
      recommend,
      confidence:Math.round(72+Math.random()*22),
      autoPushed:i<7 && Math.random()>0.4
    });
  }
  return days;
}

SCREENS.sancWarRoom=function(){
  const ms=coll("sancMilestones").slice().sort((a,b)=>{
    const r={High:0,Medium:1,Low:2}; if(r[a.risk]!==r[b.risk]) return r[a.risk]-r[b.risk];
    return new Date(a.dueAt)-new Date(b.dueAt);
  });
  const ws=groupBy(ms,m=>m.workstream);
  const done=ms.filter(m=>m.status==="Done").length;
  const inProg=ms.filter(m=>m.status==="In Progress").length;
  const notStart=ms.filter(m=>m.status==="Not Started").length;
  const highRisk=ms.filter(m=>m.risk==="High");
  const daysToOpen=Math.round((new Date(SANC.openingDate)-Date.now())/86400000);
  return pageHead("Pre-Opening War Room","Real-time readiness tracker · "+ms.length+" milestones across 7 workstreams · "+daysToOpen+" days to opening",
    `<button class="btn btn-ghost btn-sm" onclick="App.exportWarRoom()">${icon('download',15)} Export PDF</button>`)
  + `<div class="grid g4" style="margin-bottom:16px">
      ${statCard("Days to Opening",daysToOpen,SANC.opening,"flat","star")}
      ${statCard("Done",done+" / "+ms.length,Math.round(done/ms.length*100)+"% complete","up","shield")}
      ${statCard("In Progress",inProg,"active workstreams","flat","pulse")}
      ${statCard("High Risk",highRisk.length,"need attention",highRisk.length>2?"down":"flat","alert")}

    ${highRisk.length?`<div class="insight" style="margin-bottom:18px;background:linear-gradient(135deg,var(--bad-soft),#fff5f5);border-color:#f3c9c9"><span class="in-ic" style="color:var(--bad)">${icon('alert',16)}</span><span><b>AI Daily Brief for Leadership:</b> ${highRisk.length} high-risk item${highRisk.length>1?"s":""} require attention this week. ${esc(highRisk[0].task)} (${esc(highRisk[0].owner)}) is most critical — ${esc(highRisk[0].note)}.</span></div>`:""}`
  + Object.entries(ws).map(([w,arr])=>{
      const avgPct=Math.round(avg(arr,m=>m.pct));
      return `<div class="card" style="margin-bottom:14px"><div class="card-head"><h3>${esc(w)}</h3><span class="ch-sub">${arr.length} milestones · ${avgPct}% complete</span><div class="ch-act"><span class="chip ${avgPct>70?'ok':avgPct>40?'warn':'bad'}"><span class="cd"></span>${avgPct}%</span></div></div>
        <div class="tbl-wrap"><table class="dt"><thead><tr><th>Task</th><th>Owner</th><th>Due</th><th>Progress</th><th>Risk</th><th>Status</th><th>AI Note</th></tr></thead><tbody>
          ${arr.map(m=>`<tr>
            <td class="t-strong">${esc(m.task)}</td>
            <td><span class="row-flex">${avatar(m.owner,22)}<span class="t-muted">${esc(m.owner)}</span></span></td>
            <td><span class="t-muted">${fmtDate(m.dueAt)}</span></td>
            <td style="min-width:120px"><div class="bar-track"><div class="bar-fill" style="width:${m.pct}%;background:${m.pct===100?'var(--ok)':m.pct>60?'var(--accent)':'var(--warn)'}"></div></div></td>
            <td><span class="chip ${m.risk==='High'?'bad':m.risk==='Medium'?'warn':'ok'}"><span class="cd"></span>${m.risk}</span></td>
            <td>${statusChip(m.status)}</td>
            <td><span class="t-muted" style="font-size:11.5px">${esc(m.note)}</span></td>

/* money in Lakhs -> readable */
function L(v){ // v is in lakhs
  const n=Number(v)||0;
  if(Math.abs(n)>=100) return "₹"+(n/100).toFixed(2)+" Cr";
  return "₹"+n.toFixed(2)+" L";
}
function Lsigned(v){ const n=Number(v)||0; return (n>=0?"+":"")+L(n).replace("₹","₹"); }
function pctVar(a,b){ if(!b) return 0; return ((a-b)/Math.abs(b))*100; }
function varChip(actual,budget,inverse){
  const v=actual-budget; const good=inverse? v<=0 : v>=0;
  return `<span class="chip ${good?'ok':'bad'}"><span class="cd"></span>${v>=0?'+':''}${L(v)}</span>`;
}
function finTotals(period){
  const props=coll("finProps");
  const t={roomA:0,roomB:0,fbA:0,fbB:0,othA:0,othB:0,totalA:0,totalB:0,rooms:0,occWeightA:0,occWeightB:0};
  props.forEach(p=>{ const d=p[period]; t.roomA+=d.roomA;t.roomB+=d.roomB;t.fbA+=d.fbA;t.fbB+=d.fbB;t.othA+=d.othA;t.othB+=d.othB;t.totalA+=d.totalA;t.totalB+=d.totalB;t.rooms+=p.rooms;t.occWeightA+=d.occA*p.rooms;t.occWeightB+=d.occB*p.rooms; });
  t.occA=Math.round(t.occWeightA/t.rooms); t.occB=Math.round(t.occWeightB/t.rooms);
  Object.keys(t).forEach(k=>{ if(typeof t[k]==="number") t[k]=+t[k].toFixed(2); });
  return t;
}
/* grouped actual vs budget bar */
function groupedBar(data,opts){ opts=opts||{}; const w=opts.w||680,h=opts.h||240,pad=40;
  const max=Math.max(...data.flatMap(d=>[d.a,d.b]),1);
  const grp=(w-pad-12)/data.length; const bw=grp*0.32;
  let grid=""; for(let g=0;g<=4;g++){ const yy=pad+(g/4)*(h-pad-26); const val=Math.round(max-(g/4)*max); grid+=`<line x1="${pad}" y1="${yy}" x2="${w-12}" y2="${yy}" stroke="#eef2ec"/><text x="6" y="${yy+4}" font-size="9" fill="#7d8a80">${val>=100?(val/100).toFixed(0)+"Cr":val+"L"}</text>`; }
  let bars=data.map((d,i)=>{ const x0=pad+grp*i+(grp-bw*2-4)/2;
    const ha=((d.a)/max)*(h-pad-26), hb=((d.b)/max)*(h-pad-26);
    return `<rect x="${x0}" y="${h-pad-ha}" width="${bw}" height="${Math.max(ha,0)}" rx="2" fill="var(--accent)"><title>Actual ${L(d.a)}</title></rect>
      <rect x="${x0+bw+4}" y="${h-pad-hb}" width="${bw}" height="${Math.max(hb,0)}" rx="2" fill="#c9d2c4"><title>Budget ${L(d.b)}</title></rect>
      <text x="${x0+bw}" y="${h-pad+12}" font-size="9" fill="#7d8a80" text-anchor="middle" transform="rotate(-18 ${x0+bw} ${h-pad+14})">${esc(d.label)}</text>`; }).join("");
  return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}">${grid}${bars}
    <rect x="${pad}" y="6" width="10" height="10" rx="2" fill="var(--accent)"/><text x="${pad+15}" y="15" font-size="10" fill="#4a5a4f">Actual</text>
    <rect x="${pad+70}" y="6" width="10" height="10" rx="2" fill="#c9d2c4"/><text x="${pad+85}" y="15" font-size="10" fill="#4a5a4f">Budget</text></svg>`;
}

/* ---- AI FORECAST ---- */
SCREENS.finForecast=function(){
  const props=coll("finProps");
  const ytd=finTotals("ytd");
  // simple linear projection: YTD covers ~57 days of FY (Apr 1 to May 27). Project to 365.
  const daysElapsed=57; const fyDays=365; const factor=fyDays/daysElapsed;
  const projActual=+(ytd.totalA*factor).toFixed(0);
  const projBudget=+(ytd.totalB*factor).toFixed(0);
  const projGap=+(projActual-projBudget).toFixed(0);
  const runRate=+(ytd.totalA/daysElapsed).toFixed(2);
  // per property projection
  const proj=props.map(p=>({code:p.code,name:p.name,ytdA:p.ytd.totalA,ytdB:p.ytd.totalB,
    projA:+(p.ytd.totalA*factor).toFixed(0),projB:+(p.ytd.totalB*factor).toFixed(0),
    gap:+((p.ytd.totalA-p.ytd.totalB)*factor).toFixed(0)})).sort((a,b)=>a.gap-b.gap);
  const fbVar=(ytd.fbA-ytd.fbB)*factor;
  return pageHead("AI Financial Forecast","Projected full-year close at current run-rate · gap analysis · recovery scenarios")
  + `<div class="insight" style="margin-bottom:18px"><span class="in-ic">${icon('spark',16)}</span><span><b>AI projection method:</b> Based on ${daysElapsed} days of FY 2026-27 actuals (run-rate ${L(runRate)}/day), the model projects full-year close. This is a straight-line projection from YTD performance · seasonal weighting and the Sanctuary opening (Apr 2026) would refine it further.</span></div>
    <div class="grid g4" style="margin-bottom:16px">
      ${statCard("Projected FY Revenue",L(projActual),"at current run-rate","flat","spark")}
      ${statCard("Budgeted FY Revenue",L(projBudget),"full-year target","flat","chart")}
      ${statCard("Projected Gap",L(projGap),projGap<0?"shortfall risk":"on track to beat",projGap<0?"down":"up","alert")}
      ${statCard("Daily Run-Rate",L(runRate),"group revenue/day","flat","arrow")}
    </div>
    <div class="card" style="margin-bottom:16px"><div class="card-head"><h3>Full-Year Projection · Actual vs Budget</h3><span class="ch-sub">straight-line from YTD run-rate</span></div><div class="card-pad">${groupedBar(proj.slice().sort((a,b)=>b.projA-a.projA).slice(0,10).map(p=>({label:p.code,a:p.projA,b:p.projB})))}</div></div>
    <div class="insight" style="margin-bottom:16px;background:linear-gradient(135deg,var(--warn-soft),#fff)"><span class="in-ic" style="color:var(--warn)">${icon('spark',15)}</span><span><b>Recovery scenario:</b> The projected F&amp;B shortfall alone is <b>${L(Math.abs(fbVar))}</b> for the full year. Closing even half the F&amp;B gap through banquet conversion, in-room dining push, and the new Sanctuary banquet capacity would recover approximately <b>${L(Math.abs(fbVar)/2)}</b>.</span></div>
    <div class="card-head" style="background:transparent;border:none;padding:0 0 10px"><h3>Property-Level Projection</h3></div>`
  + `<div class="card"><div class="tbl-wrap"><table class="dt"><thead><tr><th>Property</th><th class="num">YTD Actual</th><th class="num">Projected FY</th><th class="num">Budgeted FY</th><th class="num">Projected Gap</th><th>Outlook</th></tr></thead><tbody>
      ${proj.map(p=>`<tr onclick="App.openFinProp('${p.code}')"><td class="t-strong">${esc(p.name.split(",")[0])}</td><td class="num tnum">${L(p.ytdA)}</td><td class="num tnum t-strong">${L(p.projA)}</td><td class="num tnum t-muted">${L(p.projB)}</td><td class="num">${varChip(p.projA,p.projB)}</td><td>${p.gap>=0?'<span class="chip ok"><span class="cd"></span>On track</span>':p.gap<-200?'<span class="chip bad"><span class="cd"></span>At risk</span>':'<span class="chip warn"><span class="cd"></span>Watch</span>'}</td></tr>`).join("")}
    </tbody></table></div></div>`;
};

    <div class="card-pad" style="padding:0">${groupedBar([{label:"Room",a:d.roomA,b:d.roomB},{label:"F&B",a:d.fbA,b:d.fbB},{label:"Other",a:d.othA,b:d.othB}],{h:160})}</div>
  </div></div>`;
  return `<div class="page-head"><div><h1 style="font-size:22px">${esc(p.name)}</h1>
    <div class="ph-sub">${esc(p.region)} · ${p.rooms} rooms · ${esc(p.status)} · as of ${FIN_AS_OF}</div></div>
    <div class="ph-actions"><button class="btn btn-ghost btn-sm" onclick="App.go('finRevenue')">← Revenue</button></div></div>
  <div class="grid g4" style="margin-bottom:18px">
    ${statCard("Today",L(p.today.totalA),L(p.today.varTotal),p.today.varTotal>=0?"up":"down","chart")}
    ${statCard("Month to Date",L(p.mtd.totalA),L(p.mtd.varTotal),p.mtd.varTotal>=0?"up":"down","grid")}
    ${statCard("Year to Date",L(p.ytd.totalA),L(p.ytd.varTotal),p.ytd.varTotal>=0?"up":"down","spark")}
    ${statCard("Debtors Outstanding",debtor?L(debtor.total):"₹0",debtor&&debtor.oldDebt>0?L(debtor.oldDebt)+" aged":"clean",debtor&&debtor.oldDebt>0?"down":"flat","alert")}
  </div>
  <div class="grid g3" style="margin-bottom:16px">
    ${periodCard("Today · "+FIN_AS_OF,p.today)}
    ${periodCard("Month to Date",p.mtd)}
    ${periodCard("Year to Date",p.ytd)}
  </div>
  <div class="grid g2">
    <div class="card"><div class="card-head"><h3>Receivables & Payables</h3></div><div class="card-pad"><div class="kv">
      <span class="k">Debtors outstanding</span><span class="v tnum">${debtor?L(debtor.total):"₹0"}</span>
      <span class="k">— over 2 years</span><span class="v tnum" style="${debtor&&debtor.oldDebt>0?'color:var(--bad)':''}">${debtor?L(debtor.oldDebt):"₹0"}</span>
      <span class="k">Trade creditors</span><span class="v tnum">${creditor?L(creditor.trade):"₹0"}</span>
      <span class="k">Statutory dues</span><span class="v tnum">${creditor?L(creditor.statutory):"₹0"}</span>
      <span class="k">Advance from parties</span><span class="v tnum" style="color:var(--accent)">${creditor?L(creditor.advanceFromParty):"₹0"}</span>
    </div></div></div>
    <div class="card"><div class="card-head"><h3>Cash & Remittance</h3></div><div class="card-pad"><div class="kv">
      <span class="k">Cash in hand</span><span class="v tnum">${cash?L(cash.cashInHand):"₹0"}</span>
      <span class="k">Cash at bank</span><span class="v tnum" style="${cash&&cash.cashAtBank<0?'color:var(--bad)':''}">${cash?L(cash.cashAtBank):"₹0"}</span>
      <span class="k">Remittance this month</span><span class="v tnum">${remit?L(remit.total):"₹0"}</span>
    </div>
    <div class="divider" style="margin:12px 0"></div>
    <div class="insight"><span class="in-ic">${icon('spark',14)}</span><span>${p.ytd.varTotal<0?`Tracking ${L(Math.abs(p.ytd.varTotal))} behind budget YTD. ${p.ytd.fbA<p.ytd.fbB?"F&B is the main gap.":"Room revenue is the main gap."}`:`Ahead of budget by ${L(p.ytd.varTotal)} YTD. Strong performer.`}</span></div>
    </div></div>
  </div>`;
};

</script>
</body>
</html>
